name: Deploy to EC2 Kind Cluster

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master

      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}

        script: |

          cd ~/fake-product-identification-blockchain

          git pull origin main

          docker build --no-cache \
          -f docker/Dockerfile.backend \
          -t docker-backend:latest .

          docker build --no-cache \
          -f docker/Dockerfile.frontend \
          -t docker-frontend:latest .

          kind load docker-image docker-backend:latest \
          --name fake-product-cluster

          kind load docker-image docker-frontend:latest \
          --name fake-product-cluster

          kubectl apply -f k8s/

          kubectl rollout restart deployment backend-deployment

          kubectl rollout restart deployment frontend-deployment
